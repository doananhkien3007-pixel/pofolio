<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Bang minh hoa truoc toi uu</title>
  <desc id="desc">Bang minh hoa tinh trang truoc toi uu voi ngan sach phan tan, CPA cao va ROAS dao dong.</desc>
  <rect width="960" height="600" rx="32" fill="#fff7ed"/>
  <rect x="40" y="40" width="880" height="520" rx="24" fill="#ffffff" stroke="#fed7aa" stroke-width="2"/>
  <text x="72" y="92" fill="#9a3412" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">TRUOC: Ngan sach phan tan, thieu nguyen tac</text>
  <text x="72" y="128" fill="#78716c" font-family="Inter, Arial, sans-serif" font-size="18">Nhom quang cao chay roi rac, kho biet nhom nao nen mo rong hay can dung.</text>
  <g transform="translate(72 172)">
    <rect width="236" height="110" rx="18" fill="#ffedd5" stroke="#fdba74"/>
    <text x="24" y="42" fill="#9a3412" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">CPA</text>
    <text x="24" y="78" fill="#7c2d12" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900">Dao dong</text>
  </g>
  <g transform="translate(332 172)">
    <rect width="236" height="110" rx="18" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="24" y="42" fill="#991b1b" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">ROAS</text>
    <text x="24" y="78" fill="#7f1d1d" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900">Lan lon</text>
  </g>
  <g transform="translate(592 172)">
    <rect width="236" height="110" rx="18" fill="#fef3c7" stroke="#fcd34d"/>
    <text x="24" y="42" fill="#92400e" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Tin hieu mo rong</text>
    <text x="24" y="78" fill="#78350f" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900">Chua ro</text>
  </g>
  <g transform="translate(72 338)">
    <text x="0" y="0" fill="#57534e" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">Hieu suat nhom quang cao</text>
    <rect x="0" y="30" width="120" height="120" rx="14" fill="#fee2e2"/>
    <rect x="142" y="70" width="120" height="80" rx="14" fill="#ffedd5"/>
    <rect x="284" y="18" width="120" height="132" rx="14" fill="#dcfce7"/>
    <rect x="426" y="96" width="120" height="54" rx="14" fill="#fee2e2"/>
    <rect x="568" y="46" width="120" height="104" rx="14" fill="#fef3c7"/>
    <line x1="0" y1="168" x2="720" y2="168" stroke="#d6d3d1" stroke-width="2"/>
  </g>
</svg>
