<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Bang minh hoa sau toi uu</title>
  <desc id="desc">Bang minh hoa sau toi uu voi nguyen tac mo rong ro rang, CPA duoc kiem soat va ROAS cao.</desc>
  <rect width="960" height="600" rx="32" fill="#ecfdf5"/>
  <rect x="40" y="40" width="880" height="520" rx="24" fill="#ffffff" stroke="#a7f3d0" stroke-width="2"/>
  <text x="72" y="92" fill="#065f46" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">SAU: Nguyen tac ro, tang truong co kiem soat</text>
  <text x="72" y="128" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Nhom quang cao duoc phan tang theo ROAS, CPA va san luong chuyen doi.</text>
  <g transform="translate(72 172)">
    <rect width="236" height="110" rx="18" fill="#dcfce7" stroke="#86efac"/>
    <text x="24" y="42" fill="#047857" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">ROAS cao nhat</text>
    <text x="24" y="78" fill="#064e3b" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900">120.99</text>
  </g>
  <g transform="translate(332 172)">
    <rect width="236" height="110" rx="18" fill="#ecfeff" stroke="#67e8f9"/>
    <text x="24" y="42" fill="#0e7490" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Chuyen doi</text>
    <text x="24" y="78" fill="#164e63" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900">3,760</text>
  </g>
  <g transform="translate(592 172)">
    <rect width="236" height="110" rx="18" fill="#f0fdf4" stroke="#86efac"/>
    <text x="24" y="42" fill="#15803d" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">CPA trung binh</text>
    <text x="24" y="78" fill="#14532d" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900">87,806d</text>
  </g>
  <g transform="translate(72 338)">
    <text x="0" y="0" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">Khung Mo rong / Toi uu / Giu / Dung</text>
    <rect x="0" y="30" width="150" height="120" rx="16" fill="#dcfce7"/>
    <text x="34" y="96" fill="#166534" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">Mo rong</text>
    <rect x="178" y="30" width="150" height="120" rx="16" fill="#dbeafe"/>
    <text x="205" y="96" fill="#1d4ed8" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">Toi uu</text>
    <rect x="356" y="30" width="150" height="120" rx="16" fill="#fef3c7"/>
    <text x="406" y="96" fill="#92400e" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">Giu</text>
    <rect x="534" y="30" width="150" height="120" rx="16" fill="#fee2e2"/>
    <text x="586" y="96" fill="#991b1b" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">Dung</text>
  </g>
</svg>
